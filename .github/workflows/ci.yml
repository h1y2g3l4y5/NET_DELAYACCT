# CI workflow for NET_DELAYACCT
# This is the canonical CI file. GitHub Actions reads from .github/workflows/.
name: net-delayacct-ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  KERNEL_TAG: linux-6.6.y
  LINUX_SRC: ${{ github.workspace }}/linux-6.6

jobs:
  checkpatch:
    name: checkpatch on kernel patches
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libelf-dev libssl-dev \
            bison flex libncurses-dev libmnl-dev ccache perl

      - name: Checkout linux-stable (shallow, with retry)
        run: |
          for i in 1 2 3 4 5; do
            git clone --depth 1 --branch "$KERNEL_TAG" \
              https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git \
              "$LINUX_SRC" && break
            echo "Clone attempt $i failed, retrying in $((i*10))s..."
            rm -rf "$LINUX_SRC"
            sleep $((i*10))
          done
          test -d "$LINUX_SRC/.git"

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            ~/.cache/ccache
          key: ccache-checkpatch-${{ runner.os }}-${{ env.KERNEL_TAG }}

      - name: Run checkpatch.pl on patches
        run: |
          set -e
          cp_dir="$LINUX_SRC/scripts"
          fail=0
          shopt -s nullglob
          patches=(kernel-patches/*.patch)
          if [ "${#patches[@]}" -eq 0 ]; then
            echo "No patches found in kernel-patches/, skipping."
            exit 0
          fi
          for p in "${patches[@]}"; do
            echo "::group::checkpatch $p"
            if ! perl "$cp_dir/checkpatch.pl" --no-tree --strict "$p"; then
              fail=1
            fi
            echo "::endgroup::"
          done
          exit "$fail"

  build-kernel:
    name: Build kernel with CONFIG_NET_DELAYACCT
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libelf-dev libssl-dev \
            bison flex libncurses-dev libmnl-dev ccache bc

      - name: Checkout linux-stable (shallow, with retry)
        run: |
          for i in 1 2 3 4 5; do
            git clone --depth 1 --branch "$KERNEL_TAG" \
              https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git \
              "$LINUX_SRC" && break
            echo "Clone attempt $i failed, retrying in $((i*10))s..."
            rm -rf "$LINUX_SRC"
            sleep $((i*10))
          done
          test -d "$LINUX_SRC/.git"

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            ~/.cache/ccache
          key: ccache-kernel-${{ runner.os }}-${{ env.KERNEL_TAG }}-${{ hashFiles('kernel-patches/*.patch', 'ci/kernel.config.fragment') }}
          restore-keys: |
            ccache-kernel-${{ runner.os }}-${{ env.KERNEL_TAG }}-

      - name: Apply kernel patches
        run: |
          set -e
          cd "$LINUX_SRC"
          shopt -s nullglob
          patches=("$GITHUB_WORKSPACE"/kernel-patches/*.patch)
          if [ "${#patches[@]}" -eq 0 ]; then
            echo "No patches to apply."
            exit 0
          fi

          # Fix xxx placeholder line numbers using actual kernel source
          for p in "${patches[@]}"; do
            if ! grep -q 'xxx' "$p" 2>/dev/null; then
              continue
            fi
            echo "Fixing placeholder line numbers in $(basename "$p")"
            if [[ "$p" == *"Kconfig"* ]]; then
              LINE=$(grep -n "config NET_RX_BUSY_POLL" net/Kconfig | head -1 | cut -d: -f1)
              START=$((LINE - 8))
              sed -i "s|@@ -xxx,6 +xxx,23 @@|@@ -${START},6 +${START},23 @@|" "$p"
              echo "  Kconfig: NET_RX_BUSY_POLL at line $LINE, hunk start=$START"
            elif [[ "$p" == *"Makefile"* ]]; then
              LINE=$(grep -n "CONFIG_FAILOVER" net/core/Makefile | head -1 | cut -d: -f1)
              START=$((LINE - 3))
              sed -i "s|@@ -xxx,6 +xxx,7 @@|@@ -${START},6 +${START},7 @@|" "$p"
              echo "  Makefile: FAILOVER at line $LINE, hunk start=$START"
            fi
          done

          for p in "${patches[@]}"; do
            echo "Applying $p"
            git apply "$p" || patch -p1 < "$p"
          done

      - name: Initialize sk_net_delayacct in sk_prot_alloc
        run: |
          sed -i 's/sk_tx_queue_clear(sk);/sk_tx_queue_clear(sk);\n\tnet_delayacct_init(\&sk->sk_net_delayacct);/' \
            "$LINUX_SRC/net/core/sock.c"
          echo "=== sock.c after init insertion ==="
          grep -A1 'sk_tx_queue_clear' "$LINUX_SRC/net/core/sock.c"

      - name: Configure kernel with fragment
        run: |
          cd "$LINUX_SRC"
          make defconfig
          scripts/kconfig/merge_config.sh -m .config \
            "$GITHUB_WORKSPACE/ci/kernel.config.fragment"
          make olddefconfig
          grep -E 'CONFIG_(NET|NET_DELAYACCT)=' .config || true

      - name: Build kernel
        run: |
          cd "$LINUX_SRC"
          make -j"$(nproc)" CC="ccache gcc" bzImage modules

      - name: Upload bzImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: bzImage
          path: ${{ env.LINUX_SRC }}/arch/x86/boot/bzImage
          retention-days: 1

  build-tool:
    name: Build userspace get_sockdelays
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libmnl-dev ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            ~/.cache/ccache
          key: ccache-tool-${{ runner.os }}

      - name: Install UAPI header
        run: |
          sudo install -m 0644 -D \
            kernel-patches/include-uapi-linux-net-delayacct.h \
            /usr/include/linux/net-delayacct.h

      - name: Build tool
        run: make tool CC="ccache gcc"

      - name: Smoke test binary
        run: |
          test -x userspace/get_sockdelays/get_sockdelays
          ./userspace/get_sockdelays/get_sockdelays -h || true

      - name: Upload get_sockdelays artifact
        uses: actions/upload-artifact@v4
        with:
          name: get_sockdelays
          path: userspace/get_sockdelays/get_sockdelays
          retention-days: 1

  qemu-test:
    name: QEMU runtime test
    runs-on: ubuntu-22.04
    needs: [build-kernel, build-tool]
    if: github.event_name == 'push'
    timeout-minutes: 30
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 iperf3 busybox-static ncat cpio

      - name: Download bzImage artifact
        uses: actions/download-artifact@v4
        with:
          name: bzImage
          path: /tmp/artifacts

      - name: Download get_sockdelays artifact
        uses: actions/download-artifact@v4
        with:
          name: get_sockdelays
          path: /tmp/artifacts

      - name: Build initramfs and run QEMU
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          mkdir -p /tmp/initrd/{bin,sbin,usr/local/bin,etc,proc,sys,dev,tmp,root,lib/x86_64-linux-gnu,lib64}

          # Verify artifacts
          test -f /tmp/artifacts/bzImage || { echo "ERROR: bzImage not found"; exit 1; }
          test -f /tmp/artifacts/get_sockdelays || { echo "ERROR: get_sockdelays not found"; exit 1; }

          # Copy busybox + create applet symlinks
          cp "$(which busybox)" /tmp/initrd/bin/busybox
          for applet in sh ls cat cp mount umount sleep kill echo grep date head tail \
            awk sed test mknod mkdir chmod readlink true false ifconfig ip timeout nc \
            nslookup wget tee; do
            ln -sf /bin/busybox "/tmp/initrd/bin/$applet"
          done

          # Copy get_sockdelays
          cp /tmp/artifacts/get_sockdelays /tmp/initrd/usr/local/bin/
          chmod +x /tmp/initrd/usr/local/bin/get_sockdelays

          # Copy test scripts
          mkdir -p /tmp/initrd/opt/test/func
          cp tests/selftests/net-delayacct/test_netdelayacct.sh tests/selftests/net-delayacct/test_helper.sh \
            /tmp/initrd/opt/test/ 2>/dev/null || true
          cp tests/func/test_*.sh /tmp/initrd/opt/test/func/ 2>/dev/null || true
          chmod +x /tmp/initrd/opt/test/*.sh /tmp/initrd/opt/test/func/*.sh 2>/dev/null || true

          # Copy guest-init.sh as init
          cp ci/qemu/guest-init.sh /tmp/initrd/init
          chmod +x /tmp/initrd/init

          # Copy demo-tests.sh for visualization + stress demos
          cp ci/qemu/demo-tests.sh /tmp/initrd/opt/demo-tests.sh
          chmod +x /tmp/initrd/opt/demo-tests.sh

          # Copy iperf3 + nc + their shared libs
          # (Remove busybox symlink first, otherwise cp follows it to /bin/busybox)
          for bin in iperf3 nc; do
            b=$(which "$bin") || { echo "WARNING: $bin not found, skipping"; continue; }
            rm -f "/tmp/initrd/bin/$bin"
            cp "$b" "/tmp/initrd/bin/$bin"
            for lib in $(ldd "$b" 2>/dev/null | grep -oP '/\S+'); do
              mkdir -p "/tmp/initrd/$(dirname "$lib")"
              cp "$lib" "/tmp/initrd$lib" 2>/dev/null || true
            done
          done

          # Copy get_sockdelays shared libs + dynamic linker
          for lib in $(ldd /tmp/artifacts/get_sockdelays 2>/dev/null | grep -oP '/\S+'); do
            mkdir -p "/tmp/initrd/$(dirname "$lib")"
            cp "$lib" "/tmp/initrd$lib" 2>/dev/null || true
          done
          if [ -f /lib64/ld-linux-x86-64.so.2 ]; then
            cp /lib64/ld-linux-x86-64.so.2 /tmp/initrd/lib64/
          fi

          # Build initramfs
          cd /tmp/initrd
          find . | cpio -o -H newc | gzip -9 > /tmp/initrd.img
          cd "$GITHUB_WORKSPACE"

          echo "Initramfs built: $(du -sh /tmp/initrd.img | cut -f1)"

          # Run QEMU
          echo "::group::QEMU boot log"
          timeout 300 qemu-system-x86_64 \
            -m 1024M -smp 2 \
            -kernel /tmp/artifacts/bzImage \
            -initrd /tmp/initrd.img \
            -append "console=ttyS0,115200n8 init=/init" \
            -nographic -no-reboot 2>&1 | tee /tmp/qemu.log || true
          echo "::endgroup::"

          # Extract results from QEMU log
          echo ""
          echo "========== TEST RESULTS =========="
          sed -n '/^=== QEMU Test Run/,/^=== Kernel net_delayacct/p' /tmp/qemu.log || echo "(no results section found)"
          grep -E '\[PASS\]|\[FAIL\]|\[SKIP\]' /tmp/qemu.log || echo "(no pass/fail lines found)"
          echo "=================================="
          echo ""
          echo "=== QEMU boot tail ==="
          tail -30 /tmp/qemu.log

          # Exit with failure if any FAIL found
          if grep -q '\[FAIL\]' /tmp/qemu.log 2>/dev/null; then
            echo "::error::Tests FAILED"
            exit 1
          fi
