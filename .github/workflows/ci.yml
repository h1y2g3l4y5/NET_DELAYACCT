# CI workflow for NET_DELAYACCT
# NOTE: This file is authored at ci/ci.yml per project layout.
# To enable it on GitHub, symlink or copy it to .github/workflows/ci.yml.
name: net-delayacct-ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  KERNEL_TAG: linux-6.6.y
  LINUX_SRC: ${{ github.workspace }}/linux-6.6

jobs:
  checkpatch:
    name: checkpatch on kernel patches
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libelf-dev libssl-dev \
            bison flex libncurses-dev libmnl-dev ccache perl

      - name: Checkout linux-stable (shallow)
        run: |
          git clone --depth 1 --branch "$KERNEL_TAG" \
            https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git \
            "$LINUX_SRC"

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            ~/.cache/ccache
          key: ccache-checkpatch-${{ runner.os }}-${{ env.KERNEL_TAG }}

      - name: Run checkpatch.pl on patches
        run: |
          set -e
          cp_dir="$LINUX_SRC/scripts"
          fail=0
          shopt -s nullglob
          patches=(kernel-patches/*.patch)
          if [ "${#patches[@]}" -eq 0 ]; then
            echo "No patches found in kernel-patches/, skipping."
            exit 0
          fi
          for p in "${patches[@]}"; do
            echo "::group::checkpatch $p"
            if ! perl "$cp_dir/checkpatch.pl" --no-tree --strict "$p"; then
              fail=1
            fi
            echo "::endgroup::"
          done
          exit "$fail"

  build-kernel:
    name: Build kernel with CONFIG_NET_DELAYACCT
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libelf-dev libssl-dev \
            bison flex libncurses-dev libmnl-dev ccache bc

      - name: Checkout linux-stable (shallow)
        run: |
          git clone --depth 1 --branch "$KERNEL_TAG" \
            https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git \
            "$LINUX_SRC"

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            ~/.cache/ccache
          key: ccache-kernel-${{ runner.os }}-${{ env.KERNEL_TAG }}-${{ hashFiles('kernel-patches/*.patch', 'ci/kernel.config.fragment') }}
          restore-keys: |
            ccache-kernel-${{ runner.os }}-${{ env.KERNEL_TAG }}-

      - name: Apply kernel patches
        run: |
          set -e
          cd "$LINUX_SRC"
          shopt -s nullglob
          patches=("$GITHUB_WORKSPACE"/kernel-patches/*.patch)
          if [ "${#patches[@]}" -eq 0 ]; then
            echo "No patches to apply."
            exit 0
          fi
          for p in "${patches[@]}"; do
            echo "Applying $p"
            git apply "$p" || patch -p1 < "$p"
          done

      - name: Install new NET_DELAYACCT source files
        run: |
          set -e
          kp="$GITHUB_WORKSPACE/kernel-patches"
          # Copy new files into the kernel tree at their canonical paths.
          # File names use '-' to represent directory separators so they
          # sit flat in kernel-patches/ (no subdirectories).
          install -m 0644 "$kp/include-net-net-delayacct.h"        "$LINUX_SRC/include/net/net-delayacct.h"
          install -m 0644 "$kp/include-uapi-linux-net-delayacct.h" "$LINUX_SRC/include/uapi/linux/net-delayacct.h"
          install -m 0644 "$kp/net-core-net-delayacct.c"           "$LINUX_SRC/net/core/net-delayacct.c"
          # Append Makefile/Kconfig fragments.
          cat "$kp/Makefile-fragment" >> "$LINUX_SRC/net/core/Makefile"
          cat "$kp/Kconfig-fragment"  >> "$LINUX_SRC/net/Kconfig"
          echo "=== Installed files ==="
          ls -la "$LINUX_SRC/include/net/net-delayacct.h" \
                 "$LINUX_SRC/include/uapi/linux/net-delayacct.h" \
                 "$LINUX_SRC/net/core/net-delayacct.c"
          echo "=== Makefile tail ==="
          tail -3 "$LINUX_SRC/net/core/Makefile"
          echo "=== Kconfig tail ==="
          tail -15 "$LINUX_SRC/net/Kconfig"

      - name: Configure kernel with fragment
        run: |
          cd "$LINUX_SRC"
          make defconfig
          scripts/kconfig/merge_config.sh -m .config \
            "$GITHUB_WORKSPACE/ci/kernel.config.fragment"
          make olddefconfig
          grep -E 'CONFIG_(NET|NET_DELAYACCT)=' .config || true

      - name: Build kernel
        run: |
          cd "$LINUX_SRC"
          make -j"$(nproc)" CC="ccache gcc" bzImage modules

  build-tool:
    name: Build userspace get_sockdelays
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libmnl-dev ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            ~/.cache/ccache
          key: ccache-tool-${{ runner.os }}

      - name: Install UAPI header
        run: |
          sudo install -m 0644 -D \
            kernel-patches/include-uapi-linux-net-delayacct.h \
            /usr/include/linux/net-delayacct.h

      - name: Build tool
        run: make tool CC="ccache gcc"

      - name: Smoke test binary
        run: |
          test -x userspace/get_sockdelays/get_sockdelays
          ./userspace/get_sockdelays/get_sockdelays -h || true

  qemu-test:
    name: QEMU runtime test (self-hosted)
    runs-on: self-hosted
    if: github.event_name == 'push'
    timeout-minutes: 60
    env:
      LINUX_SRC: /home/runner/linux-6.6
      ROOTFS_IMG: /home/runner/qemu-rootfs.img
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Run QEMU test pipeline
        run: sudo bash ci/qemu/ci-test.sh
